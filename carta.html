<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #e8f0f8; /* Fondo azul claro */
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .carta {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            font-family: 'Brush Script MT', cursive; /* Fuente cursiva */
            color: #2c3e50; /* Azul oscuro */
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .barra {
            height: 5px;
            background: linear-gradient(to right, #3498db, #9b59b6); /* Barra azul y morado */
            margin-bottom: 20px;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: #34495e; /* Azul grisáceo */
        }
    </style>
</head>
<body>
    <div class="carta">
        <h1>Paratifranklin</h1>
        <div class="barra"></div>
        
    </div>
</body>
</html>
